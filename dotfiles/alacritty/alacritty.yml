#import:
#  - ~/.cache/wal/colors-alacritty.yml

env:
  TERM: xterm-256color
window:
  opacity: 0.9
  dimensions:
    columns: 80
    lines: 20
  position:
    x: 0
    y: 0

  padding:
    x: 12
    y: 12

  dynamic_padding: true
  dynamic_title: true
  decorations: none
  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 10000
  multiplier: 3

# Font configuration
font:
  normal:
    family: Terminus
#    family: xos4 Terminus
    style: Regular
  size: 9.5
  offset:
    x: 0
    y: 1

#background_opacity: 0.9

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  ave_to_clipboard: true

cursor:
  style: Beam

shell:
  program: /bin/zsh
  args:
    - -l

working_directory: None

#mouse:
#  hide_when_typing: true
#  url:
#    launcher:
#      program: xdg-open
#      args: []

mouse_bindings:
  - {mouse: Middle, mods: Shift, action: PasteSelection}
  - {mouse: Right, mods: Shift, action: Paste}
  - {mouse: Middle, action: None}
  - {mouse: Right, action: None}

key_bindings:
  - {key: Return, mods: Control|Shift, action: SpawnNewInstance}
  - {key: V, mods: Alt, action: Paste}
  - {key: J, mods: Alt, action: IncreaseFontSize}
