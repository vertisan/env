# Notebook's Keyboard
input "1:1:AT_Translated_Set_2_keyboard" {
  xkb_layout pl
}

# --Home: WD19 Keyboard
input "1133:49960:Logitech_USB_Keyboard" {
  xkb_layout pl
  xkb_numlock enabled
}
