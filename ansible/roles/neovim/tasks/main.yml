---
- name: VRS | Neovim
  block:
    - name: Install Neovim
      aur:
        name:
          - neovim

    - name: Install plugin manager
      command: sh -c 'curl -fLo "${XDG_DATA_HOME:-$HOME/.local/share}"/nvim/site/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim'

    - name: Make symlink to configuration
      file:
        src: "{{ envdir }}/dotfiles/nvim"
        dest: "{{ user_config_dir }}/nvim"
        state: link
        force: true
