---
- name: VRS | ZSH
  block:
  - name: Install ZSH
    aur:
      name: 
        - zsh
      state: present

  - name: Change default shell to ZSH for "{{ username }}"
    become: true
    user:
      name: "{{ username }}"
      shell: /usr/bin/zsh

  - name: Make symlink to configuration
    file:
      src: "{{ envdir }}/dotfiles/zsh/.zshrc"
      dest: "{{ homedir }}/.zshrc"
      state: link
      force: true
